name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/web-buddy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/web-buddy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium system dependencies
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run Skill Candidate Plane tests
        run: npm run test:skill-candidates:built

      - name: Run deterministic eval
        run: node ./scripts/eval-deterministic-test.mjs

      - name: Verify offline research isolation
        run: node ./scripts/offline-research-isolation-test.mjs

<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>Direct Submit Fixture</title>
</head>
<body>
  <main>
    <h1>前端开发工程师</h1>
    <section aria-label="application notice">
      <h2>申请工作需知</h2>
      <p>该岗位将使用你的站内在线简历投递，没有额外申请表字段。</p>
    </section>
    <form>
      <label>
        <input id="agree" name="agree" type="checkbox">
        我已阅读并同意申请工作需知
      </label>
      <button type="submit">投递简历</button>
    </form>
  </main>
</body>
</html>

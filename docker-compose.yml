services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: multi-functional-agent-web-buddy:local
    init: true
    working_dir: /app
    shm_size: "1gb"
    stdin_open: true
    tty: true
    ports:
      - "${WEB_BUDDY_PORT:-5178}:5178"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "5178"
      TRACE_OUT_DIR: /app/output
      RESUME_PDF_PATH: ${RESUME_PDF_PATH:-/app/tmp/pdfs/resume.pdf}

      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_API_BASE: ${ANTHROPIC_API_BASE:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-glm-4.7}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-}

      MODEL_API_KEY: ${MODEL_API_KEY:-}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-}
      MODEL_NAME: ${MODEL_NAME:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-}
      MODEL_ENABLE_THINKING: ${MODEL_ENABLE_THINKING:-}
      MODEL_EXTRA_BODY_JSON: ${MODEL_EXTRA_BODY_JSON:-}

      PLAYWRIGHT_STORAGE_STATE: ${PLAYWRIGHT_STORAGE_STATE:-}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      PLAYWRIGHT_VISUAL_HIGHLIGHT: ${PLAYWRIGHT_VISUAL_HIGHLIGHT:-false}
      PLAYWRIGHT_KEEP_BROWSER_OPEN: ${PLAYWRIGHT_KEEP_BROWSER_OPEN:-false}
      PLAYWRIGHT_TYPE_DELAY_MS: ${PLAYWRIGHT_TYPE_DELAY_MS:-0}
      PLAYWRIGHT_SLOWMO_MS: ${PLAYWRIGHT_SLOWMO_MS:-0}
      PLAYWRIGHT_NAVIGATION_TIMEOUT_MS: ${PLAYWRIGHT_NAVIGATION_TIMEOUT_MS:-90000}
      PLAYWRIGHT_ACTION_TIMEOUT_MS: ${PLAYWRIGHT_ACTION_TIMEOUT_MS:-20000}
      PLAYWRIGHT_VIEWPORT_WIDTH: ${PLAYWRIGHT_VIEWPORT_WIDTH:-1280}
      PLAYWRIGHT_VIEWPORT_HEIGHT: ${PLAYWRIGHT_VIEWPORT_HEIGHT:-840}
      PLAYWRIGHT_ALLOWED_DOMAINS: ${PLAYWRIGHT_ALLOWED_DOMAINS:-}
      PLAYWRIGHT_BLOCK_LOCALHOST: ${PLAYWRIGHT_BLOCK_LOCALHOST:-false}

      HUMAN_GATE_MODE: ${HUMAN_GATE_MODE:-auto}
      ALIBABA_CAREERS_URL: ${ALIBABA_CAREERS_URL:-https://talent-holding.alibaba.com/off-campus/position-list?lang=zh}
      ALIBABA_PROBE_JOB_TITLE: ${ALIBABA_PROBE_JOB_TITLE:-}
      AGENT_MAX_JOBS_TO_DETAIL: ${AGENT_MAX_JOBS_TO_DETAIL:-3}
      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-50}
    volumes:
      - ./output:/app/output
      - ./tmp:/app/tmp

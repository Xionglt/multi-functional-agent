<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>Login Wall Fixture</title>
</head>
<body>
  <main>
    <h1>账号登录</h1>
    <p>请登录后继续投递。</p>
    <form>
      <label for="phone">手机号</label>
      <input id="phone" name="phone" type="text">
      <label for="password">密码登录</label>
      <input id="password" name="password" type="password">
      <label>
        <input id="agree" name="agree" type="checkbox">
        我已阅读并同意登录协议
      </label>
      <button type="submit">登录并投递简历</button>
    </form>
  </main>
</body>
</html>
